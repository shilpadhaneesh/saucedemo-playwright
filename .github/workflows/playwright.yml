name: Playwright Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * 1-5'  # 9am UK time, Mon-Fri

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: playwright install chromium --with-deps


      - name: Create reports directory
        run: mkdir -p reports allure-results

      - name: Run tests
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://www.saucedemo.com' }}
          STANDARD_USER: ${{ secrets.STANDARD_USER || 'standard_user' }}
          LOCKED_USER: ${{ secrets.LOCKED_USER || 'locked_out_user' }}
          PROBLEM_USER: ${{ secrets.PROBLEM_USER || 'problem_user' }}
          PASSWORD: ${{ secrets.PASSWORD || 'secret_sauce' }}
        run: |
          pytest --browser=${{ matrix.browser }} \
                 --html=reports/test_report_${{ matrix.browser }}.html \
                 --self-contained-html \
                 --alluredir=allure-results \
                 -v

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-report-${{ matrix.browser }}
          path: reports/test_report_${{ matrix.browser }}.html
          retention-days: 30

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 30
